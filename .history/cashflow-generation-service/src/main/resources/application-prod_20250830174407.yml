server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  http2:
    enabled: true

spring:
  profiles:
    active: prod
  main:
    allow-bean-definition-overriding: false
  application:
    name: cashflow-generation-service
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/cashflow_prod
    username: cashflow_user
    password: ${DB_PASSWORD:changeme}
    pool:
      max-size: 20
      initial-size: 5
      max-idle-time: 30m
      max-life-time: 60m
      validation-query: "SELECT 1"
  data:
    r2dbc:
      repositories:
        enabled: true
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
    jedis:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 2
        max-wait: 10000ms
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

# Production Application Configuration
cashflow:
  actor:
    max-actors: 100
    max-idle-time: 300
    cleanup-interval: 120
    message-timeout: 30000
    pool-size: 50
  database:
    max-pool-size: 20
    initial-pool-size: 5
    max-idle-time: 1800
    max-life-time: 3600
    validation-query: "SELECT 1"
    enable-metrics: true
    connection-timeout: 30000
    validation-timeout: 5000
  thread-partitioning:
    pool-size: 16
    queue-capacity: 1000
    keep-alive-time: 300
    enable-monitoring: true
    max-threads-per-partition: 4
  performance:
    batch-size: 100
    timeout-seconds: 300
    max-concurrent-requests: 1000
    circuit-breaker:
      failure-threshold: 10
      timeout: 60000
      reset-timeout: 300000
  monitoring:
    metrics:
      enabled: true
      export:
        prometheus:
          enabled: true
    health:
      detailed: true
      components:
        database: true
        redis: true
        actors: true
        thread-pools: true

# Security Configuration
security:
  oauth2:
    resource-server:
      jwt:
        issuer-uri: ${JWT_ISSUER_URI:https://auth.company.com/realms/cashflow}
        jwk-set-uri: ${JWT_JWK_SET_URI:https://auth.company.com/realms/cashflow/protocol/openid_connect/certs}
  cors:
    allowed-origins: 
      - https://cashflow-ui.company.com
      - https://api.company.com
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# Logging Configuration
logging:
  level:
    com.finos.cashflow: INFO
    org.springframework: WARN
    org.springframework.r2dbc: WARN
    org.springframework.data.r2dbc: WARN
    reactor.netty: WARN
    io.r2dbc: WARN
    io.micrometer: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: logs/cashflow-generation-service.log
    max-size: 100MB
    max-history: 30

# Management and Monitoring
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops,loggers
      base-path: /actuator
      cors:
        allowed-origins: "*"
        allowed-methods: GET,POST
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 60s
    distribution:
      percentiles-histogram:
        http.server.requests: true
        cashflow.generation.time: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
        cashflow.generation.time: 0.5, 0.9, 0.95, 0.99
  tracing:
    enabled: true
    sampling:
      probability: 0.1

# Resilience Configuration
resilience4j:
  circuitbreaker:
    instances:
      cashflow-generation:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        sliding-window-size: 10
        minimum-number-of-calls: 5
      database:
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30000
        sliding-window-size: 20
  retry:
    instances:
      cashflow-generation:
        max-attempts: 3
        wait-duration: 1000
        exponential-backoff-multiplier: 2
      database:
        max-attempts: 2
        wait-duration: 500
  ratelimiter:
    instances:
      api:
        limit-for-period: 1000
        limit-refresh-period: 1s
        timeout-duration: 0s

# Thread Pool Configuration
spring:
  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 500
        keep-alive: 60s
      thread-name-prefix: cashflow-task-
    scheduling:
      pool:
        size: 4
      thread-name-prefix: cashflow-scheduled-

# JVM Performance Tuning
server:
  undertow:
    threads:
      io: 16
      worker: 64
    buffer-size: 1024
    direct-buffers: true
  netty:
    connection-timeout: 30000
    idle-timeout: 600000

