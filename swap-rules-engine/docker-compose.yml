services:
  # ---------------------------------------------------------------------------
  # SQL Server 2022 Developer Edition. Strong-password requirement enforced.
  # Default credentials (override with MSSQL_PASSWORD env var):
  #   user:     sa
  #   password: Swap_rules_1!
  #   database: swap_rules  (created by db-init below)
  # ---------------------------------------------------------------------------
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: swap-rules-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD:-Swap_rules_1!}
      MSSQL_PID: "Developer"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -No -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # One-shot: waits for SQL Server to be healthy, then creates swap_rules db.
  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: swap-rules-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD:-Swap_rules_1!}
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" -Q "IF DB_ID('swap_rules') IS NULL CREATE DATABASE swap_rules;"
    restart: "no"

volumes:
  mssql-data:
