spring:
  application:
    name: swap-archiver
  main:
    web-application-type: none        # CLI batch job, no web server
  # Flyway manages ONLY the control schema (archive.*) in the control DB.
  flyway:
    enabled: true
    locations: classpath:db/archive
    default-schema: dbo

archiver:
  job-name: ${ARCHIVER_JOB:basket-archive}
  mode: ${ARCHIVER_MODE:ARCHIVE}      # ARCHIVE | RESTORE | DRY_RUN
  as-of-date: ${ARCHIVER_AS_OF:}      # defaults to today when blank

  # --- Control DB (holds the archive.* control tables; Flyway target) ---
  control:
    url: jdbc:sqlserver://${CTL_HOST:localhost}:${CTL_PORT:1433};databaseName=${CTL_DB:archive_control};encrypt=true;trustServerCertificate=true
    auth: kerberos                    # kerberos | integrated | sql
    credential:
      provider: ambient-kerberos      # ambient-kerberos | cyberark-ccp | env

  # --- Source DW (FULL recovery, Availability Group) ---
  source:
    url: jdbc:sqlserver://${SRC_HOST:localhost}:${SRC_PORT:1433};databaseName=${SRC_DB:dw};encrypt=true;trustServerCertificate=true
    auth: kerberos
    credential:
      provider: ambient-kerberos
      keytab: ${SRC_KEYTAB:}          # optional: re-init JAAS on ticket expiry

  # --- Archive target (recommend SIMPLE recovery, outside the AG) ---
  target:
    url: jdbc:sqlserver://${TGT_HOST:localhost}:${TGT_PORT:1433};databaseName=${TGT_DB:archive};encrypt=true;trustServerCertificate=true
    auth: sql                         # phase B/C typically SQL via CyberArk
    credential:
      provider: cyberark-ccp
      cyberark:
        base-url: ${CCP_URL:https://ccp.internal/AIMWebService/api/Accounts}
        app-id: SWAP_ARCHIVER
        safe: ${CCP_SAFE:ARCHIVE_DB}
        object-name: ${CCP_OBJECT:svc_archive_writer}
        client-cert-alias: archiver-mtls
        cache-ttl-seconds: 300

  # --- Restore (investigations) ---
  restore:
    target-db: ${RESTORE_DB:archive_investigation}
    allow-restore-to-source: false

  # --- Throttling / pacing ---
  throttle:
    target-chunk-millis: 30000        # AIMD target duration per chunk
    poll-pause-millis: 5000           # backoff while waiting for log/AG to clear

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
