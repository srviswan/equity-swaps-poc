spring:
  application:
    name: swap-rules-admin
  # ----------------------------------------------------------------------------
  # Default profile = H2 running in Microsoft SQL Server compatibility mode.
  # Zero-Docker demo experience; identical SQL surface to the real engine.
  # Activate the `mssql` profile (e.g. SPRING_PROFILES_ACTIVE=mssql) to use the
  # production-grade SQL Server backend declared below.
  # ----------------------------------------------------------------------------
  datasource:
    url: jdbc:h2:mem:swaprules;MODE=MSSQLServer;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # Schema is owned by Flyway. Hibernate must not validate column types
      # because dialect detection (H2 vs SQLServer) differs across environments.
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

swap-rules:
  trace:
    topic: swap.enrichment.trace
  snapshot:
    redis-channel: swap.rules.snapshot.published

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs

# ============================================================================
# Real SQL Server profile.
#   docker compose up -d   (see /docker-compose.yml)
#   SPRING_PROFILES_ACTIVE=mssql java -jar swap-rules-admin/...
# Override host/db/user/pass via the matching env vars.
# ============================================================================
---
spring:
  config:
    activate:
      on-profile: mssql
  datasource:
    url: jdbc:sqlserver://${MSSQL_HOST:localhost}:${MSSQL_PORT:1433};databaseName=${MSSQL_DB:swap_rules};encrypt=false;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: ${MSSQL_USER:sa}
    password: ${MSSQL_PASSWORD:Swap_rules_1!}
  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.SQLServerDialect
  flyway:
    # SQL Server complains if the application user can't see the default schema
    # when Flyway runs CREATE TABLE without a schema-qualified name. dbo is fine.
    default-schema: dbo
