# F3 golden-fixture rule set (FR-204/205/207 exit criteria).
#
# Effective-dating scenario (FR-205): ECON-US-SS-NYSE exists in two versions —
#   v1 (LIBOR / 300bps) effective 2026-01-01..2026-05-31
#   v2 (SOFR  / 250bps) effective 2026-06-01..open
# Both compile into ONE full-range snapshot; the trade date selects the version.

rules:
  # --- ECONOMIC / INTEREST_LEG (LAYERED) ---
  - id: ECON-US-SS-NYSE
    version: 1
    name: US single-stock NYSE financing defaults (H1-2026)
    category: ECONOMIC
    target: INTEREST_LEG
    priority: 10
    effectiveFrom: 2026-01-01
    effectiveTo: 2026-05-31
    status: PUBLISHED
    criteria:
      - { field: attributes.location, operator: EQ, value: US }
      - { field: attributes.assetType, operator: EQ, value: SINGLE_STOCK }
      - { field: attributes.exchange, operator: EQ, value: NYSE }
    actions:
      - { targetPath: interestLeg.rateType, value: FLOATING }
      - { targetPath: interestLeg.spreadBps, value: 300 }

  - id: ECON-US-SS-NYSE
    version: 2
    name: US single-stock NYSE financing defaults (SOFR transition)
    category: ECONOMIC
    target: INTEREST_LEG
    priority: 10
    effectiveFrom: 2026-06-01
    status: PUBLISHED
    criteria:
      - { field: attributes.location, operator: EQ, value: US }
      - { field: attributes.assetType, operator: EQ, value: SINGLE_STOCK }
      - { field: attributes.exchange, operator: EQ, value: NYSE }
    actions:
      - { targetPath: interestLeg.rateType, value: FLOATING }
      - { targetPath: interestLeg.spreadBps, value: 250 }

  # Layering base: less specific, fills remaining nulls (NEVER policy);
  # its spreadBps must NOT overwrite the NYSE rule's value.
  - id: ECON-BASE
    version: 1
    name: Global financing fallback
    category: ECONOMIC
    target: INTEREST_LEG
    priority: 100
    status: PUBLISHED
    criteria:
      - { field: productType, operator: EQ, value: EQUITY_SWAP }
    actions:
      - { targetPath: interestLeg.dayCount, value: ACT/360 }
      - { targetPath: interestLeg.spreadBps, value: 100 }

  # --- ECONOMIC / SCHEDULE (LAYERED) ---
  - id: ECON-SCHEDULE-DEFAULT
    version: 1
    name: Default payment schedule
    category: ECONOMIC
    target: SCHEDULE
    priority: 100
    status: PUBLISHED
    criteria:
      - { field: productType, operator: EQ, value: EQUITY_SWAP }
    actions:
      - { targetPath: schedule.paymentFrequency, value: MONTHLY }

  # --- NON_ECONOMIC / LEGAL_ENTITY (FIRST_MATCH; ops-managed) ---
  - id: NONECON-CM-H12456
    version: 1
    name: Client master H12456 booking entity
    category: NON_ECONOMIC
    target: LEGAL_ENTITY
    priority: 10
    status: PUBLISHED
    criteria:
      - { field: attributes.clientMasterNo, operator: EQ, value: H12456 }
    actions:
      - { targetPath: legalEntity, value: PB_ENTITY_US }

  - id: NONECON-LE-FALLBACK
    version: 1
    name: Default booking entity
    category: NON_ECONOMIC
    target: LEGAL_ENTITY
    priority: 100
    status: PUBLISHED
    criteria: []
    actions:
      - { targetPath: legalEntity, value: PB_ENTITY_GLOBAL }

  # --- WORKFLOW (FIRST_MATCH) ---
  - id: WF-DEFAULT
    version: 1
    name: Default workflow state
    category: WORKFLOW
    target: WORKFLOW
    priority: 100
    status: PUBLISHED
    criteria: []
    actions:
      - { targetPath: workflowStatus, value: PENDING_VALIDATION }

  # Disabled rule: must never fire (compiler drops it even full-range).
  - id: ECON-DISABLED
    version: 1
    name: Disabled — must not fire
    category: ECONOMIC
    target: INTEREST_LEG
    priority: 1
    enabled: false
    status: PUBLISHED
    criteria: []
    actions:
      - { targetPath: interestLeg.spreadBps, value: 999, overridePolicy: ALWAYS }
